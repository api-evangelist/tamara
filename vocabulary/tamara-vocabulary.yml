description: |
  Domain vocabulary covering Tamara's BNPL platform — its products, lifecycle states, regulatory framing,
  and operational concepts — for use in cross-API search, indexing, and Naftiko governance.
sources:
- https://docs.tamara.co/
- https://docs.tamara.co/reference/tamara-api-reference-documentation
- https://tamara.co/en
