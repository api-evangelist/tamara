naftiko: 1.0.0-alpha2
info:
  label: Tamara Webhooks API
  description: 'Tamara Webhooks API. 4 operations. Lead operation: Tamara Register Webhook. Self-contained Naftiko capability covering Tamara''s webhook registration and lifecycle surfaces.'
  tags:
  - Tamara
  - Webhooks
  - Events
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    TAMARA_API_TOKEN: TAMARA_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: webhooks
    baseUri: https://api.tamara.co
    description: Tamara Webhooks API business capability.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: registerwebhook
        method: POST
        description: Tamara Register Webhook URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: webhooks-webhookid
      path: /webhooks/{webhookId}
      operations:
      - name: retrievewebhook
        method: GET
        description: Tamara Retrieve Webhook URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
      - name: updatewebhook
        method: PUT
        description: Tamara Update Webhook URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletewebhook
        method: DELETE
        description: Tamara Delete Webhook URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TAMARA_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: webhooks-rest
    port: 8080
    description: REST adapter for Tamara Webhooks API.
    resources:
    - path: /v1/webhooks
      name: webhooks
      operations:
      - method: POST
        name: registerwebhook
        description: Tamara Register Webhook URL
        call: webhooks.registerwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhook-id}
      name: webhooks-webhook-id
      operations:
      - method: GET
        name: retrievewebhook
        description: Tamara Retrieve Webhook URL
        call: webhooks.retrievewebhook
        with:
          webhookId: rest.webhookId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatewebhook
        description: Tamara Update Webhook URL
        call: webhooks.updatewebhook
        with:
          webhookId: rest.webhookId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: Tamara Delete Webhook URL
        call: webhooks.deletewebhook
        with:
          webhookId: rest.webhookId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tamara Webhooks API.
    tools:
    - name: tamara-register-webhook
      description: Tamara Register Webhook URL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: webhooks.registerwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tamara-retrieve-webhook
      description: Tamara Retrieve Webhook URL
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks.retrievewebhook
      with:
        webhookId: tools.webhookId
      outputParameters:
      - type: object
        mapping: $.
    - name: tamara-update-webhook
      description: Tamara Update Webhook URL
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks.updatewebhook
      with:
        webhookId: tools.webhookId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tamara-delete-webhook
      description: Tamara Delete Webhook URL
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: webhooks.deletewebhook
      with:
        webhookId: tools.webhookId
      outputParameters:
      - type: object
        mapping: $.
