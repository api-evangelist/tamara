naftiko: 1.0.0-alpha2
info:
  label: Tamara Payments API — Captures and Refunds
  description: 'Tamara Payments API — Captures and Refunds. 3 operations. Lead operation: Tamara Capture Order. Self-contained Naftiko capability covering one Tamara business surface.'
  tags:
  - Tamara
  - Payments
  - Captures
  - Refunds
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    TAMARA_API_TOKEN: TAMARA_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: payments
    baseUri: https://api.tamara.co
    description: Tamara Payments API — Captures and Refunds business capability.
    resources:
    - name: payments-capture
      path: /payments/capture
      operations:
      - name: captureorder
        method: POST
        description: Tamara Capture Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: payments-simplified-refund-order_id
      path: /payments/simplified-refund/{order_id}
      operations:
      - name: simplifiedrefund
        method: POST
        description: Tamara Simplified Refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: payments-refund
      path: /payments/refund
      operations:
      - name: refund
        method: POST
        description: Tamara Refund (legacy)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.TAMARA_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: payments-rest
    port: 8080
    description: REST adapter for Tamara Payments API.
    resources:
    - path: /v1/payments/capture
      name: payments-capture
      operations:
      - method: POST
        name: captureorder
        description: Tamara Capture Order
        call: payments.captureorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/simplified-refund/{order-id}
      name: payments-simplified-refund-order-id
      operations:
      - method: POST
        name: simplifiedrefund
        description: Tamara Simplified Refund
        call: payments.simplifiedrefund
        with:
          order_id: rest.order_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/refund
      name: payments-refund
      operations:
      - method: POST
        name: refund
        description: Tamara Refund (legacy)
        call: payments.refund
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tamara Payments API.
    tools:
    - name: tamara-capture-order
      description: Tamara Capture Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments.captureorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tamara-simplified-refund
      description: Tamara Simplified Refund
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: payments.simplifiedrefund
      with:
        order_id: tools.order_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tamara-refund-legacy
      description: Tamara Refund (legacy)
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: payments.refund
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
