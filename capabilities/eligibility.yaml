naftiko: 1.0.0-alpha2
info:
  label: Tamara Pre-Checkout Eligibility API
  description: Tamara Pre-Checkout Eligibility API. 1 operation. Self-contained Naftiko capability that lets a merchant
    decide whether to render Tamara as a payment option for a given customer and basket.
  tags:
  - Tamara
  - Eligibility
  - Pre-Checkout
  - Risk
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    TAMARA_API_TOKEN: TAMARA_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: eligibility
    baseUri: https://api.tamara.co
    description: Tamara Pre-Checkout Eligibility business capability.
    resources:
    - name: pre-checkout-v1-eligibility
      path: /pre-checkout/v1/eligibility
      operations:
      - name: precheckouteligibility
        method: POST
        description: Tamara Pre-Checkout Eligibility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: bearer
      token: '{{env.TAMARA_API_TOKEN}}'
  exposes:
  - type: rest
    namespace: eligibility-rest
    port: 8080
    description: REST adapter for Tamara Pre-Checkout Eligibility.
    resources:
    - path: /v1/pre-checkout/v1/eligibility
      name: pre-checkout-v1-eligibility
      operations:
      - method: POST
        name: precheckouteligibility
        description: Tamara Pre-Checkout Eligibility
        call: eligibility.precheckouteligibility
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: eligibility-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tamara Pre-Checkout Eligibility.
    tools:
    - name: tamara-pre-checkout-eligibility
      description: Tamara Pre-Checkout Eligibility
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: eligibility.precheckouteligibility
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
